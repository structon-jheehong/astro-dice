<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>astro-compass</title>
<style>
:root{
  --bg:#030712;
  --deep:#07101f;
  --panel:rgba(12,18,32,.72);
  --line:rgba(148,163,184,.08);
  --text:#edf2f7;
  --muted:#8b9bb3;
  --soft:#c9d4e5;
  --silver:rgba(226,232,240,.28);
}
*{box-sizing:border-box}
html{
  scroll-behavior:smooth;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(96,165,250,.05), transparent 28%),
    radial-gradient(circle at top right, rgba(168,85,247,.05), transparent 30%),
    linear-gradient(180deg,#020617,#07101f 40%,#020617);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  line-height:1.9;
  overflow-x:hidden;
}
.wrap{
  width:min(760px,92vw);
  margin:0 auto;
  padding:72px 0 180px;
}
.hero{
  margin-bottom:54px;
}
.logo{
  font-size:30px;
  font-weight:700;
  letter-spacing:-.06em;
}
.hero p{
  margin-top:14px;
  color:var(--muted);
  font-size:14px;
  line-height:2;
}
.input-wrap{
  border:1px solid var(--line);
  background:var(--panel);
  border-radius:34px;
  padding:30px;
  backdrop-filter:blur(24px);
  box-shadow:0 20px 60px rgba(0,0,0,.24);
}
textarea{
  width:100%;
  min-height:120px;
  border:none;
  resize:none;
  outline:none;
  background:transparent;
  color:var(--text);
  font-size:18px;
  line-height:2;
}
textarea::placeholder{
  color:#64748b;
}
.bottom-row{
  margin-top:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.hint{
  color:#64748b;
  font-size:12px;
}
button{
  border:none;
  cursor:pointer;
  transition:.25s ease;
}
.main-btn{
  background:rgba(255,255,255,.06);
  color:#e2e8f0;
  border-radius:999px;
  padding:14px 24px;
  font-size:14px;
  letter-spacing:-.02em;
}
.main-btn:hover{
  background:rgba(255,255,255,.1);
}
.snapshot{
  margin-top:68px;
  border:1px solid rgba(148,163,184,.06);
  background:rgba(8,15,28,.54);
  border-radius:40px;
  padding:54px 42px 40px;
  backdrop-filter:blur(26px);
  box-shadow:0 30px 80px rgba(0,0,0,.34);
  animation:fadeUp .8s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.snapshot-label{
  color:rgba(148,163,184,.72);
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  margin-bottom:34px;
}
.question{
  color:rgba(148,163,184,.56);
  font-size:13px;
  margin-bottom:42px;
  line-height:2;
}
.flow-line{
  font-size:34px;
  line-height:1.5;
  letter-spacing:-.06em;
  margin-bottom:68px;
  color:#f8fafc;
}
.scene{
  white-space:pre-line;
  font-size:23px;
  line-height:2.4;
  color:white;
  margin-bottom:72px;
  letter-spacing:-.03em;
}
.bridge{
  color:#d5deeb;
  line-height:2.15;
  font-size:16px;
  margin-bottom:64px;
}
.soft-block{
  display:flex;
  flex-direction:column;
  gap:24px;
}
.soft-block p:first-child{
  color:#b8c6da;
  font-size:15px;
  line-height:2.1;
}
.soft-block p:last-child{
  color:rgba(184,198,218,.52);
  font-size:14px;
  line-height:2.1;
}
.coord{
  margin-top:90px;
  color:var(--silver);
  font-size:11px;
  letter-spacing:.2em;
}
.share-wrap{
  margin-top:42px;
  display:flex;
  justify-content:flex-end;
}
.share-box{
  position:relative;
}
.share-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.04);
  color:#dbe4f1;
  font-size:15px;
}
.share-btn:hover{
  background:rgba(255,255,255,.08);
}
.share-menu{
  display:none;
  position:absolute;
  right:0;
  margin-top:12px;
  width:150px;
  background:#0b1324;
  border:1px solid rgba(148,163,184,.08);
  border-radius:18px;
  overflow:hidden;
  backdrop-filter:blur(18px);
}
.share-menu button{
  width:100%;
  background:transparent;
  color:#dbe4f1;
  text-align:left;
  padding:15px 16px;
  border-bottom:1px solid rgba(255,255,255,.03);
}
.share-menu button:last-child{
  border-bottom:none;
}
.card-render{
  width:1080px;
  min-height:1400px;
  position:fixed;
  left:-99999px;
  top:0;
  padding:110px 90px;
  background:
    radial-gradient(circle at top left, rgba(96,165,250,.06), transparent 28%),
    radial-gradient(circle at top right, rgba(168,85,247,.05), transparent 30%),
    linear-gradient(180deg,#020617,#07101f);
  color:white;
}
.card-small{
  color:rgba(226,232,240,.42);
  font-size:24px;
  margin-bottom:46px;
  letter-spacing:.14em;
}
.card-question{
  color:rgba(226,232,240,.48);
  font-size:28px;
  line-height:2;
  margin-bottom:72px;
}
.card-flow{
  font-size:60px;
  line-height:1.45;
  letter-spacing:-.06em;
  margin-bottom:92px;
}
.card-scene{
  white-space:pre-line;
  font-size:46px;
  line-height:2.25;
  margin-bottom:110px;
}
.card-bridge{
  color:rgba(255,255,255,.74);
  font-size:34px;
  line-height:2.2;
}
.card-coord{
  margin-top:150px;
  color:rgba(255,255,255,.24);
  font-size:20px;
  letter-spacing:.18em;
}
@media(max-width:700px){
  .snapshot{padding:42px 28px 34px}
  .flow-line{font-size:28px}
  .scene{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

  <section class="hero">
    <div class="logo">astro-compass</div>
    <p>질문에 대한 지금의 흐름을 사진처럼 바라봅니다.</p>
  </section>

  <section class="input-wrap">
    <textarea id="question" placeholder="예: 지금 만드는 방향, 계속 이어가도 괜찮을까?"></textarea>

    <div class="bottom-row">
      <div class="hint">결과보다 흐름을 바라보는 질문이 잘 맞습니다.</div>
      <button class="main-btn" id="generateBtn">스냅샷 남기기</button>
    </div>
  </section>

  <section class="snapshot" id="snapshot" style="display:none;">

    <div class="snapshot-label">질문에 대한 스냅샷</div>

    <div class="question" id="questionText"></div>

    <div class="flow-line" id="flowLine"></div>

    <div class="scene" id="scene"></div>

    <div class="bridge" id="bridge"></div>

    <div class="soft-block">
      <p id="healthyText"></p>
      <p id="blurredText"></p>
    </div>

    <div class="coord" id="coord"></div>

    <div class="share-wrap">
      <div class="share-box">
        <button class="share-btn" id="shareBtn">↗</button>

        <div class="share-menu" id="shareMenu">
          <button id="copyBtn">텍스트 복사</button>
          <button id="saveBtn">이미지 저장</button>
          <button id="shareNativeBtn">공유하기</button>
        </div>
      </div>
    </div>

  </section>
</div>

<div class="card-render" id="shareCard">
  <div class="card-small">질문에 대한 스냅샷</div>

  <div class="card-question" id="cardQuestion"></div>

  <div class="card-flow" id="cardFlow"></div>

  <div class="card-scene" id="cardScene"></div>

  <div class="card-bridge" id="cardBridge"></div>

  <div class="card-coord" id="cardCoord"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const planets = [
  {
    icon:'♄',
    name:'토성',
    sign:'염소자리',
    house:'4하우스',
    flow:'오래 이어갈수록 형태가 잡히는 흐름',
    scene:`기둥을 세운다.\n계단을 하나씩 오른다.\n안쪽 구조를 다시 다진다.`,
    bridge:'방향은 막히지 않았지만, 급히 밀기보다 반복 가능한 형태를 만드는 쪽에 가깝다.',
    healthy:'급히 밀기보다, 반복 가능한 속도에서 흐름이 오래 이어진다.',
    blurred:'결론을 서두를수록, 발걸음보다 마음이 먼저 앞서갈 수 있다.'
  },
  {
    icon:'♆',
    name:'해왕성',
    sign:'물고기자리',
    house:'10하우스',
    flow:'감각이 먼저 움직이는 흐름',
    scene:`안개가 내려앉는다.\n분명한 선보다 감각이 먼저 움직인다.\n바깥보다 안쪽 울림이 커지는 장면이다.`,
    bridge:'지금은 결론을 고정하기보다 흐름을 천천히 바라보는 편이 자연스럽다.',
    healthy:'분명한 선보다 작은 울림을 따라갈 때 흐름이 오래 남는다.',
    blurred:'바깥 소리를 오래 붙들고 있으면 안쪽 감각이 멀어질 수 있다.'
  },
  {
    icon:'♇',
    name:'명왕성',
    sign:'전갈자리',
    house:'9하우스',
    flow:'열려 있지만 결을 살펴야 하는 흐름',
    scene:`뿌리까지 파고든다.\n계단을 하나씩 오른다.\n지도 밖을 바라본다.`,
    bridge:'방향은 막히지 않았지만, 쓰는 방식이 중요하다. 결론을 통보하기보다 지금 힘이 모이는 장면을 남긴다.',
    healthy:'깊이를 서두르지 않을수록, 흐름은 아래쪽에서 천천히 힘을 만든다.',
    blurred:'한 방향만 오래 바라보고 있으면, 주변 풍경이 조용히 멀어질 수 있다.'
  }
]

const questionInput = document.getElementById('question')
const snapshot = document.getElementById('snapshot')

const questionText = document.getElementById('questionText')
const flowLine = document.getElementById('flowLine')
const scene = document.getElementById('scene')
const bridge = document.getElementById('bridge')
const healthyText = document.getElementById('healthyText')
const blurredText = document.getElementById('blurredText')
const coord = document.getElementById('coord')

const cardQuestion = document.getElementById('cardQuestion')
const cardFlow = document.getElementById('cardFlow')
const cardScene = document.getElementById('cardScene')
const cardBridge = document.getElementById('cardBridge')
const cardCoord = document.getElementById('cardCoord')

let currentText = ''

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){
  const q = questionInput.value.trim()

  if(!q){
    alert('질문을 적어주세요.')
    return
  }

  const p = pick(planets)

  snapshot.style.display = 'block'

  questionText.innerHTML = `“${q}”`
  flowLine.textContent = p.flow
  scene.textContent = p.scene
  bridge.textContent = p.bridge
  healthyText.textContent = p.healthy
  blurredText.textContent = p.blurred
  coord.textContent = `${p.icon} ${p.name} · ${p.sign} · ${p.house}`

  cardQuestion.innerHTML = `“${q}”`
  cardFlow.textContent = p.flow
  cardScene.textContent = p.scene
  cardBridge.textContent = p.bridge
  cardCoord.textContent = `${p.icon} ${p.name} · ${p.sign} · ${p.house}`

  currentText = `질문에 대한 스냅샷\n\n“${q}”\n\n${p.flow}\n\n${p.scene}\n\n${p.bridge}`

  snapshot.scrollIntoView({behavior:'smooth'})
}

document.getElementById('generateBtn').addEventListener('click',generate)

const shareBtn = document.getElementById('shareBtn')
const shareMenu = document.getElementById('shareMenu')

shareBtn.addEventListener('click',()=>{
  shareMenu.style.display = shareMenu.style.display === 'block' ? 'none' : 'block'
})

document.addEventListener('click',(e)=>{
  if(!e.target.closest('.share-box')){
    shareMenu.style.display = 'none'
  }
})

document.getElementById('copyBtn').addEventListener('click',async()=>{
  await navigator.clipboard.writeText(currentText)
  alert('텍스트를 복사했습니다.')
})

document.getElementById('saveBtn').addEventListener('click', async()=>{
  const canvas = await html2canvas(document.getElementById('shareCard'), {
    scale:2
  })

  const link = document.createElement('a')
  link.download = 'astro-compass.png'
  link.href = canvas.toDataURL('image/png')
  link.click()
})

document.getElementById('shareNativeBtn').addEventListener('click', async()=>{
  if(navigator.share){
    navigator.share({
      title:'astro-compass',
      text:currentText
    })
  }
})
</script>
</body>
</html>
