      padding: 24px;

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.045em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 19px;
      letter-spacing: -0.03em;
    }

      margin: 20px 0 10px;
      font-size: 16px;
      letter-spacing: -0.02em;

    .small { color: var(--muted); font-size: 12px; }

    label {
      display: block;
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #020617;
      color: var(--text);
      padding: 14px 15px;
      font-size: 15px;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      cursor: pointer;
      border: none;
      border-radius: 15px;
      padding: 14px 15px;
      color: white;
      font-weight: 900;
      font-size: 15px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      transition: transform .08s ease, opacity .1s ease;
    }

    button.secondary {
      background: #1f2937;
      border: 1px solid var(--line);
      color: var(--text);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    button:active { transform: scale(.99); }

    @media (max-width: 640px) {
      .row { flex-direction: column; }
    }

    .dice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    @media (max-width: 640px) {
      .dice-grid { grid-template-columns: 1fr; }
    }

    .dice {
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 12px;
      text-align: center;
    }

    .dice .kind {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .dice .icon {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 7px;
    }

    .dice .name {
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.035em;
    }

    .result {

      padding: 18px;
      border-radius: 20px;
      background: rgba(2, 6, 23, .72);
      border: 1px solid var(--line);
    }

    .block {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .55);
      margin-top: 12px;
    }

    .answer-title {
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.035em;
      margin-bottom: 6px;
    }

    .yes { color: var(--yes); }
    .no { color: var(--no); }
    .hold { color: var(--hold); }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      width: 98px;
      color: var(--muted);
      font-weight: 800;

    }

      white-space: pre-line;
      font-size: 15px;
    }

    .notice {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(251,191,36,.35);
      background: rgba(251,191,36,.08);

      font-size: 13px;

      font-size: 13px;

    .history {

      padding-top: 16px;

    .history-item:hover {

    }

    .history-item:last-child { border-bottom: none; }

    .question-box {
      font-size: 15px;
      color: #dbeafe;
      word-break: break-word;
    }
  </style>

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function cleanQuestion(q) {
  return q.replaceAll(" ", "").replaceAll("\n", "").replaceAll("\t", "");
}

function classifyQuestion(question) {
  const q = cleanQuestion(question);

  const stopWords = /(그만|멈출까|안할까|끊을까|포기|취소|접을까|철회|중단)/;
  const goWords = /(할까|해도될까|진행|계속|시작|가도|만나|살까|쓸까|결제|구매|등록|올릴까|괜찮|맞을까|해야|될까|나아)/;

  if (stopWords.test(q)) return "stop";
  if (goWords.test(q)) return "go";
  return "open";
}

function getConclusion(p, s, h, question) {
  const drive = p.drive + s.drive + h.drive;
  const stability = p.stability + s.stability + h.stability;
  const clarity = p.clarity + s.clarity + h.clarity;
  const type = classifyQuestion(question);

  const YES = {
    label: "흐름이 열려있음",
    badge: "YES",
    className: "yes",
    meaning: "자연스럽게 열릴 예정이니 이어가되 강행하지는 마세요",
    line: "흐름이 막혀 있지 않고 이어질 수 있는 상태"
  };

  const NO = {
    label: "흐름이 어긋남",
    badge: "NO",
    className: "no",
    meaning: "너무 애쓰고 있거나 시야가 좁아진 상태, 점검·조정 필요",
    line: "현재 좌표가 자연스럽게 이어지기보다 어긋나 있는 상태"
  };

  const HOLD = {
    label: "판단이 어려움",
    badge: "보류",
    className: "hold",
    meaning: "너무 광범위한 질문이며 기준이 서지 않은 상태",
    line: "지금은 결론보다 기준을 다시 정리해야 하는 상태"
  };

  if (clarity <= -2) return HOLD;

  if (type === "stop") {
    if (drive <= 0 || stability <= -1) return YES;
    if (drive >= 3 && stability >= 0) return NO;
    return HOLD;
  }

  if (type === "go") {
    if (drive >= 3 && stability >= 0 && clarity >= 0) return YES;
    if (drive <= -1 || stability <= -2) return NO;
    return HOLD;
  }

  if (drive >= 3 && stability >= 0 && clarity >= 0) return YES;
  if (drive <= -1 || stability <= -2) return NO;
  return HOLD;
}

function makeShortReading(c, p, s, h) {
  if (c.badge === "YES") {
    return `${p.key}의 힘이 ${s.key} 방식으로 ${h.key}의 무대에서 열리는 흐름입니다. 다만 힘으로 밀기보다 자연스럽게 이어지는지 확인하는 쪽이 좋습니다.`;
  }
  if (c.badge === "NO") {
    return `${p.key}의 힘이 ${s.key} 방식으로 드러나지만, ${h.key}의 무대에서 흐름이 걸리는 상태입니다. 지금은 밀어붙이기보다 점검과 조정이 먼저입니다.`;
  }
  return `${p.key}의 힘이 ${s.key} 방식으로 ${h.key}의 무대에 놓여 있습니다. 지금은 결론보다 질문의 기준을 다시 정리하는 흐름입니다.`;
}

function makeSceneReading(p, s, h, c) {
  const first = p.scene;
  const second = s.scene;
  const third = h.scene;

  let ending = "";
  if (c.badge === "YES") {
    ending = "그래서 이 흐름은 막혀 있다기보다 열려 있다. 다만 억지로 열기보다, 이미 열린 틈을 따라가는 장면에 가깝다.";
  } else if (c.badge === "NO") {
    ending = "그래서 이 흐름은 바로 밀고 나가기보다 어긋난 축을 먼저 확인해야 한다. 힘을 더 쓰는 장면이 아니라, 손을 멈추고 위치를 다시 보는 장면에 가깝다.";
  } else {
    ending = "그래서 이 흐름은 아직 답을 고르는 장면이 아니다. 먼저 질문의 기준을 좁히고, 무엇을 보고 판단할지 다시 세우는 장면에 가깝다.";
  }

  return `${first}\n${second}\n${third}\n\n${ending}`;
}

function renderDice(p, s, h) {
  document.getElementById("diceGrid").innerHTML = `
    <div class="dice"><div class="kind">행성 / 기능</div><div class="icon">${p.icon}</div><div class="name">${p.name}</div></div>
    <div class="dice"><div class="kind">별자리 / 결</div><div class="icon">${s.icon}</div><div class="name">${s.name}</div></div>
    <div class="dice"><div class="kind">하우스 / 무대</div><div class="icon">${h.icon}</div><div class="name">${h.name}</div></div>
  `;
}

function buildReading(question, p, s, h) {
  const c = getConclusion(p, s, h, question);
  const shortReading = makeShortReading(c, p, s, h);
  const sceneReading = makeSceneReading(p, s, h, c);

  return `
    <div class="block">
      <h2>질문내용</h2>
      <div class="question-box">${escapeHtml(question)}</div>
    </div>

    <div class="block">
      <div class="answer-title ${c.className}">✅ ${c.badge} · ${c.label}</div>
      <p><strong>${c.meaning}</strong></p>
      <p class="small">${c.line}</p>
    </div>

    <div class="block">
      <h2>짧은 해석</h2>
      <p>${shortReading}</p>
    </div>

    <div class="block">
      <h2>상세 해석</h2>
      <table>
        <tbody>
          <tr><th>${p.name}</th><td>${p.key} — ${p.text}</td></tr>
          <tr><th>${s.name}</th><td>${s.key} — ${s.text}</td></tr>
          <tr><th>${h.name}</th><td>${h.key} — ${h.text}</td></tr>
        </tbody>
      </table>

      <h3>종합 해석</h3>
      <div class="scene">${sceneReading}</div>
    </div>
  `;
}

function roll() {
  const questionEl = document.getElementById("question");
  const errorEl = document.getElementById("error");
  const question = questionEl.value.trim();

  if (!question) {
    errorEl.style.display = "block";
    questionEl.focus();
    return;
  }

  errorEl.style.display = "none";

  const p = pick(planets);
  const s = pick(signs);
  const h = pick(houses);

  renderDice(p, s, h);
  document.getElementById("reading").innerHTML = buildReading(question, p, s, h);

  history.unshift({ question, p, s, h, time: new Date() });
  if (history.length > 15) history = history.slice(0, 15);
  renderHistory();

  questionEl.value = "";
}

function renderHistory() {
  if (!history.length) {
    document.getElementById("historyList").textContent = "기록 없음.";
    return;
  }

  document.getElementById("historyList").innerHTML = history.map((item, index) => `
    <div class="history-item" data-index="${index}" title="클릭하면 상세 해석을 다시 봅니다">
      <div>
        <strong>${escapeHtml(item.question)}</strong><br>
        ${item.p.icon} ${item.p.name} · ${item.s.icon} ${item.s.name} · ${item.h.name}
      </div>
      <div>${item.time.toLocaleTimeString()}</div>
    </div>
  `).join("");

  document.querySelectorAll(".history-item").forEach(el => {
    el.addEventListener("click", () => {
      const item = history[Number(el.dataset.index)];
      if (!item) return;
      renderDice(item.p, item.s, item.h);
      document.getElementById("reading").innerHTML = buildReading(item.question, item.p, item.s, item.h);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function clearAll() {
  document.getElementById("question").value = "";
  document.getElementById("error").style.display = "none";
  document.getElementById("diceGrid").innerHTML = `
    <div class="dice"><div class="kind">행성 / 기능</div><div class="icon">-</div><div class="name">대기</div></div>
    <div class="dice"><div class="kind">별자리 / 결</div><div class="icon">-</div><div class="name">대기</div></div>
    <div class="dice"><div class="kind">하우스 / 무대</div><div class="icon">-</div><div class="name">대기</div></div>
  `;
  document.getElementById("reading").innerHTML = `
    <p class="muted">질문을 입력하고 주사위를 굴려주세요.</p>
  `;
  history = [];
  renderHistory();
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

document.getElementById("rollBtn").addEventListener("click", roll);
document.getElementById("clearBtn").addEventListener("click", clearAll);
document.getElementById("question").addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") roll();
});
</script>
