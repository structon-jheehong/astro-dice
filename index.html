<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>astro-compass</title>
  <style>
    :root{--bg:#020617;--panel:#111827;--text:#e5e7eb;--muted:#9ca3af;--line:#334155;--accent:#38bdf8;--yes:#34d399;--no:#fb7185;--hold:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 18% 0%,rgba(56,189,248,.16),transparent 32%),radial-gradient(circle at 82% 0%,rgba(168,85,247,.13),transparent 32%),linear-gradient(180deg,#020617,#0f172a);color:var(--text);line-height:1.58}
    .wrap{max-width:820px;margin:0 auto;padding:34px 16px 64px}
    .card{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:0 20px 54px rgba(0,0,0,.34)}
    h1{margin:0 0 6px;font-size:30px;letter-spacing:-.045em}
    h2{margin:0 0 10px;font-size:16px;letter-spacing:-.025em;color:var(--muted)}
    p{margin:0 0 10px}.muted{color:var(--muted);font-size:14px}.small{color:var(--muted);font-size:12px}
    label{display:block;margin:18px 0 8px;color:var(--muted);font-size:13px;font-weight:700}
    textarea{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line);border-radius:18px;background:#020617;color:var(--text);padding:14px 15px;font-size:15px;outline:none}
    textarea:focus{border-color:var(--accent)}
    .row{display:flex;gap:10px;margin-top:12px}
    button{flex:1;cursor:pointer;border:none;border-radius:15px;padding:14px 15px;color:white;font-weight:900;font-size:15px;background:linear-gradient(135deg,#0ea5e9,#2563eb);transition:transform .08s ease,opacity .1s ease}
    button.secondary{background:#1f2937;border:1px solid var(--line);color:var(--text)}
    button:active{transform:scale(.99)}
    @media(max-width:640px){.row{flex-direction:column}}
    .dice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
    @media(max-width:640px){.dice-grid{grid-template-columns:1fr}}
    .dice{background:#020617;border:1px solid var(--line);border-radius:20px;padding:18px 12px;text-align:center}
    .dice .kind{color:var(--muted);font-size:13px;margin-bottom:8px}
    .dice .icon{font-size:34px;line-height:1;margin-bottom:7px}
    .dice .name{font-size:22px;font-weight:950;letter-spacing:-.035em}
    .result{margin-top:18px;padding:18px;border-radius:20px;background:rgba(2,6,23,.72);border:1px solid var(--line)}
    .block{padding:15px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.55);margin-top:12px}
    .answer-title{font-size:22px;font-weight:950;letter-spacing:-.035em;margin-bottom:4px}
    .yes{color:var(--yes)}.no{color:var(--no)}.hold{color:var(--hold)}
    .status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media(max-width:640px){.status-grid{grid-template-columns:1fr}}
    .status-item{background:#020617;border:1px solid var(--line);border-radius:14px;padding:11px}
    .status-item .label{color:var(--muted);font-size:12px;margin-bottom:4px}.status-item .value{font-weight:800}
    .coord-list{display:grid;gap:8px}.coord{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid rgba(51,65,85,.65);padding:8px 0}.coord:last-child{border-bottom:none}.coord strong{white-space:nowrap}.coord span{color:var(--muted);text-align:right}
    .scene{white-space:pre-line;font-size:15px}
    .notice{margin-top:14px;padding:12px 14px;border-radius:16px;border:1px solid rgba(251,191,36,.35);background:rgba(251,191,36,.08);color:#fde68a;font-size:13px}
    .error{margin-top:10px;color:#fecaca;font-size:13px;display:none}
    .history{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
    .history-item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 8px;border-bottom:1px solid rgba(51,65,85,.6);border-radius:12px;font-size:13px;color:var(--muted);cursor:pointer}
    .history-item:hover{background:rgba(15,23,42,.8);color:var(--text)}.history-item:last-child{border-bottom:none}
    .question-box{font-size:15px;color:#dbeafe;word-break:break-word}
  </style>
<script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=27573"></script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>astro-compass</h1>
      <p class="muted">지금 질문의 좌표</p>
      <label for="question">질문 ('~랑 ~중 뭐가 좋을까?'같은 vs형 질문은 피해주세요) </label>
      <textarea id="question" placeholder="예: 나 잘 하고 있는거지?"></textarea>
      <div id="error" class="error">질문을 먼저 적어주세요.</div>
      <div class="row"><button id="rollBtn">좌표 보기</button><button class="secondary" id="clearBtn">초기화</button></div>
      <div class="dice-grid" id="diceGrid">
        <div class="dice"><div class="kind">행성 / 기능</div><div class="icon">-</div><div class="name">대기</div></div>
        <div class="dice"><div class="kind">별자리 / 결</div><div class="icon">-</div><div class="name">대기</div></div>
        <div class="dice"><div class="kind">하우스 / 무대</div><div class="icon">-</div><div class="name">대기</div></div>
      </div>
      <div class="result" id="reading"><p class="muted">질문을 입력하고 좌표를 확인하세요.</p></div>
      <div class="notice">이 해석은 현재 흐름의 좌표일 뿐, 결론·운명·옳고 그름을 뜻하지 않습니다.</div>
      <div class="history"><strong>기록</strong><div id="historyList" class="small" style="margin-top:8px;">기록 없음.</div></div>
    </section>
  </main>
<script>
const planets=[
{name:"태양",icon:"☉",keyword:"자아",direction:"열림",movement:"바깥으로 움직임",scene:"불이 켜진다.\n숨은 기준이 밖으로 드러난다.\n스스로의 방향을 확인하는 흐름이다."},
{name:"달",icon:"☽",keyword:"반응",direction:"머묾",movement:"안쪽에 머묾",scene:"몸이 먼저 반응한다.\n익숙한 감각이 올라온다.\n안전한 자리를 확인하는 흐름이다."},
{name:"수성",icon:"☿",keyword:"해석",direction:"중립",movement:"정보가 움직임",scene:"흩어진 종이를 맞춘다.\n말과 생각이 연결된다.\n결정보다 정리가 먼저인 흐름이다."},
{name:"금성",icon:"♀",keyword:"선택",direction:"열림",movement:"끌리는 쪽으로 움직임",scene:"손이 한쪽으로 간다.\n억지보다 끌림이 먼저다.\n무엇을 취할지 확인하는 흐름이다."},
{name:"화성",icon:"♂",keyword:"추진",direction:"열림",movement:"앞으로 움직임",scene:"발이 먼저 나간다.\n힘이 앞쪽으로 실린다.\n움직임이 생기는 흐름이다."},
{name:"목성",icon:"♃",keyword:"확장",direction:"열림",movement:"넓어짐",scene:"시야가 넓어진다.\n작은 선택이 큰 방향으로 이어진다.\n의미가 붙는 흐름이다."},
{name:"토성",icon:"♄",keyword:"구조",direction:"머묾",movement:"자리를 굳힘",scene:"기둥을 세운다.\n빠른 결과보다 버티는 힘을 본다.\n구조를 먼저 잡는 흐름이다."},
{name:"천왕성",icon:"♅",keyword:"전환",direction:"열림",movement:"기존 판을 바꿈",scene:"낡은 회로가 끊긴다.\n익숙한 방식이 흔들린다.\n다른 구조가 들어오는 흐름이다."},
{name:"해왕성",icon:"♆",keyword:"흐림",direction:"흐림",movement:"경계가 흐려짐",scene:"안개가 내려앉는다.\n감정과 상상이 섞인다.\n분명한 선이 흐려지는 흐름이다."},
{name:"명왕성",icon:"♇",keyword:"재편",direction:"깊어짐",movement:"근원으로 들어감",scene:"뿌리까지 파고든다.\n표면보다 아래가 움직인다.\n근본이 다시 짜이는 흐름이다."},
{name:"북노드",icon:"☊",keyword:"방향",direction:"열림",movement:"낯선 쪽으로 향함",scene:"낯선 길이 열린다.\n편하지는 않지만 몸이 기울어진다.\n다음 방향을 보는 흐름이다."},
{name:"남노드",icon:"☋",keyword:"회귀",direction:"머묾",movement:"익숙한 자리로 돌아감",scene:"발이 익숙한 자리로 돌아간다.\n안정은 있지만 반복이 남는다.\n기본값으로 돌아가는 흐름이다."}
];
const signs=[
{name:"양자리",icon:"♈︎",keyword:"돌파",sustain:"불안정",scene:"문이 열리기 전에 손이 먼저 나간다.\n막힘을 힘으로 뚫는 결이다."},
{name:"황소자리",icon:"♉︎",keyword:"지속",sustain:"유지 가능",scene:"땅을 다진다.\n급히 바꾸기보다 오래 버틸 형태를 찾는 결이다."},
{name:"쌍둥이자리",icon:"♊︎",keyword:"연결",sustain:"변동",scene:"말과 정보가 오간다.\n하나에 고정되기보다 가능성이 움직이는 결이다."},
{name:"게자리",icon:"♋︎",keyword:"보호",sustain:"유지 가능",scene:"문을 닫고 안쪽을 살핀다.\n내부를 지키는 결이다."},
{name:"사자자리",icon:"♌︎",keyword:"발현",sustain:"중립",scene:"무대 위에 불이 들어온다.\n숨기기보다 존재를 드러내는 결이다."},
{name:"처녀자리",icon:"♍︎",keyword:"정제",sustain:"유지 가능",scene:"작은 나사를 다시 조인다.\n빠진 부분을 정리하는 결이다."},
{name:"천칭자리",icon:"♎︎",keyword:"조율",sustain:"중립",scene:"저울이 흔들린다.\n한쪽으로 밀기보다 균형점을 찾는 결이다."},
{name:"전갈자리",icon:"♏︎",keyword:"관통",sustain:"중립",scene:"겉껍질을 벗기고 안쪽을 본다.\n넓이보다 깊이를 택하는 결이다."},
{name:"사수자리",icon:"♐︎",keyword:"확장",sustain:"불안정",scene:"먼 곳에 깃발이 보인다.\n세부보다 방향이 먼저 보이는 결이다."},
{name:"염소자리",icon:"♑︎",keyword:"구조",sustain:"유지 가능",scene:"계단을 하나씩 오른다.\n작동 가능한 기준을 세우는 결이다."},
{name:"물병자리",icon:"♒︎",keyword:"재설계",sustain:"변동",scene:"설계도를 다시 그린다.\n감정에서 떨어져 구조를 새로 보는 결이다."},
{name:"물고기자리",icon:"♓︎",keyword:"용해",sustain:"흐림",scene:"물감이 물에 번진다.\n나누기보다 섞이는 결이다."}
];
const houses=[
{name:"1하우스",icon:"1",keyword:"자아",visibility:"드러남",scene:"내가 앞으로 나온다.\n질문이 나의 태도로 드러나는 자리다."},
{name:"2하우스",icon:"2",keyword:"자원",visibility:"드러남",scene:"손에 쥔 것을 확인한다.\n감당할 수 있는 자리를 보는 무대다."},
{name:"3하우스",icon:"3",keyword:"정보",visibility:"드러남",scene:"말과 신호를 확인한다.\n정보와 소통이 드러나는 무대다."},
{name:"4하우스",icon:"4",keyword:"기반",visibility:"내부",scene:"집의 바닥을 본다.\n안쪽의 기반이 드러나는 무대다."},
{name:"5하우스",icon:"5",keyword:"표현",visibility:"드러남",scene:"손에서 무언가 만들어진다.\n자발적 표현이 살아나는 무대다."},
{name:"6하우스",icon:"6",keyword:"관리",visibility:"드러남",scene:"매일 쓰는 도구를 닦는다.\n반복과 관리가 드러나는 무대다."},
{name:"7하우스",icon:"7",keyword:"타자",visibility:"드러남",scene:"마주 앉은 사람이 있다.\n상대와의 반응이 드러나는 무대다."},
{name:"8하우스",icon:"8",keyword:"공유",visibility:"깊음",scene:"내 손 밖의 것이 얽힌다.\n통제 밖의 깊이가 드러나는 무대다."},
{name:"9하우스",icon:"9",keyword:"의미",visibility:"드러남",scene:"지도 밖을 바라본다.\n믿음과 방향이 드러나는 무대다."},
{name:"10하우스",icon:"10",keyword:"사회",visibility:"드러남",scene:"바깥 간판이 바뀐다.\n역할과 위치가 드러나는 무대다."},
{name:"11하우스",icon:"11",keyword:"집단",visibility:"드러남",scene:"사람들의 흐름 속에 선다.\n집단과 방향성이 드러나는 무대다."},
{name:"12하우스",icon:"12",keyword:"비가시",visibility:"숨김",scene:"불 꺼진 방에서 소리가 들린다.\n보이지 않는 감각이 작동하는 무대다."}
];
let history=[];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function getConclusion(p,s,h){
 const clear=p.direction==="열림"||p.direction==="머묾"||p.direction==="깊어짐";
 const stable=s.sustain==="유지 가능"||s.sustain==="중립";
 const visible=h.visibility==="드러남"||h.visibility==="내부";
 const unclear=p.direction==="흐림"||s.sustain==="흐림"||h.visibility==="숨김";
 const unstable=s.sustain==="불안정"||s.sustain==="변동";
 const hidden=h.visibility==="깊음"||h.visibility==="숨김";
 if(unclear&&(unstable||hidden))return{badge:"보류",label:"판단이 어려움",className:"hold"};
 const aligned=[clear,stable,visible].filter(Boolean).length;
 const blocked=[unclear,unstable,hidden].filter(Boolean).length;
 if(aligned>=2&&blocked<=1)return{badge:"YES",label:"흐름이 열려있음",className:"yes"};
 if(blocked>=2)return{badge:"NO",label:"흐름이 어긋남",className:"no"};
 return{badge:"보류",label:"판단이 어려움",className:"hold"};
}
function getStatus(p,s,h){return{direction:p.movement,sustain:s.sustain,visibility:h.visibility}}
function makeScene(p,s,h,c){
 const ending=c.badge==="YES"?"이미 열린 틈을 따라가는 흐름이다.":c.badge==="NO"?"힘을 더 쓰기보다 위치를 다시 보는 흐름이다.":"답보다 기준을 먼저 세우는 흐름이다.";
 return `${p.scene}\n${s.scene}\n${h.scene}\n${ending}`;
}
function renderDice(p,s,h){
 document.getElementById("diceGrid").innerHTML=`<div class="dice"><div class="kind">행성 / 기능</div><div class="icon">${p.icon}</div><div class="name">${p.name}</div></div><div class="dice"><div class="kind">별자리 / 결</div><div class="icon">${s.icon}</div><div class="name">${s.name}</div></div><div class="dice"><div class="kind">하우스 / 무대</div><div class="icon">${h.icon}</div><div class="name">${h.name}</div></div>`;
}
function buildReading(question,p,s,h){
 const c=getConclusion(p,s,h),status=getStatus(p,s,h),scene=makeScene(p,s,h,c);
 return `<div class="block"><h2>질문</h2><div class="question-box">${escapeHtml(question)}</div></div><div class="block"><div class="answer-title ${c.className}">✅ ${c.badge}</div><p><strong>${c.label}</strong></p></div><div class="block"><h2>상태</h2><div class="status-grid"><div class="status-item"><div class="label">방향</div><div class="value">${status.direction}</div></div><div class="status-item"><div class="label">유지</div><div class="value">${status.sustain}</div></div><div class="status-item"><div class="label">가시성</div><div class="value">${status.visibility}</div></div></div></div><div class="block"><h2>좌표</h2><div class="coord-list"><div class="coord"><strong>${p.icon} ${p.name}</strong><span>${p.keyword}</span></div><div class="coord"><strong>${s.icon} ${s.name}</strong><span>${s.keyword}</span></div><div class="coord"><strong>${h.name}</strong><span>${h.keyword}</span></div></div></div><div class="block"><h2>장면</h2><div class="scene">${scene}</div></div>`;
}
function roll(){
 const qel=document.getElementById("question"),err=document.getElementById("error"),question=qel.value.trim();
 if(!question){err.style.display="block";qel.focus();return}
 err.style.display="none";
 const p=pick(planets),s=pick(signs),h=pick(houses),c=getConclusion(p,s,h);
 renderDice(p,s,h);document.getElementById("reading").innerHTML=buildReading(question,p,s,h);
 history.unshift({question,p,s,h,c,time:new Date()});if(history.length>15)history=history.slice(0,15);renderHistory();qel.value="";
}
function renderHistory(){
 if(!history.length){document.getElementById("historyList").textContent="기록 없음.";return}
 document.getElementById("historyList").innerHTML=history.map((item,index)=>`<div class="history-item" data-index="${index}"><div><strong>${escapeHtml(item.question)}</strong><br>${item.p.icon} ${item.p.name} · ${item.s.icon} ${item.s.name} · ${item.h.name}</div><div class="${item.c.className}">${item.c.label}</div></div>`).join("");
 document.querySelectorAll(".history-item").forEach(el=>{el.addEventListener("click",()=>{const item=history[Number(el.dataset.index)];if(!item)return;renderDice(item.p,item.s,item.h);document.getElementById("reading").innerHTML=buildReading(item.question,item.p,item.s,item.h);window.scrollTo({top:0,behavior:"smooth"});})});
}
function clearAll(){
 document.getElementById("question").value="";document.getElementById("error").style.display="none";
 document.getElementById("diceGrid").innerHTML=`<div class="dice"><div class="kind">행성 / 기능</div><div class="icon">-</div><div class="name">대기</div></div><div class="dice"><div class="kind">별자리 / 결</div><div class="icon">-</div><div class="name">대기</div></div><div class="dice"><div class="kind">하우스 / 무대</div><div class="icon">-</div><div class="name">대기</div></div>`;
 document.getElementById("reading").innerHTML=`<p class="muted">질문을 입력하고 좌표를 확인하세요.</p>`;history=[];renderHistory();
}
function escapeHtml(str){return str.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
document.getElementById("rollBtn").addEventListener("click",roll);
document.getElementById("clearBtn").addEventListener("click",clearAll);
document.getElementById("question").addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="Enter")roll()});
</script>
</body>
</html>
